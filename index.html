<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Portail Investissement Dolfines</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;500;600;700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="auth.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0E1520;
    position: relative;
    overflow: hidden;
}

/* Background image */
.bg {
    position: fixed;
    inset: 0;
    background-image: url("Banque d'images/image1.jpeg");
    background-size: cover;
    background-position: center;
    z-index: 0;
    transition: opacity 0.5s;
}

.bg-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg,
        rgba(14,21,32,0.82) 0%,
        rgba(14,21,32,0.65) 50%,
        rgba(14,21,32,0.78) 100%);
    z-index: 1;
}

/* Login card */
.card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.97);
    border-radius: 20px;
    padding: 48px 44px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.15);
    animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Logo */
.logo-wrap {
    text-align: center;
    margin-bottom: 28px;
}

.logo-img {
    height: 52px;
    width: auto;
    object-fit: contain;
}

.card-title {
    font-family: 'Teko', sans-serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #1A1A1A;
    text-align: center;
    margin-bottom: 4px;
    line-height: 1;
}

.card-sub {
    text-align: center;
    font-size: 12.5px;
    color: #7A7670;
    font-weight: 300;
    margin-bottom: 32px;
}

/* Form */
.field {
    margin-bottom: 18px;
}

.field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Poppins', sans-serif;
    color: #7A7670;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 7px;
}

.input-wrap {
    position: relative;
    display: flex;
    align-items: center;
}

.field input {
    width: 100%;
    border: 1.5px solid #E2E0DB;
    border-radius: 10px;
    padding: 12px 44px 12px 14px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    color: #1A1A1A;
    background: #FAFAF8;
    outline: none;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
}

.field input:focus {
    border-color: #1863DC;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(24,99,220,0.10);
}

.field input.error {
    border-color: #D94F4F;
    box-shadow: 0 0 0 3px rgba(217,79,79,0.10);
}

/* Password toggle */
.pw-toggle {
    position: absolute;
    right: 13px;
    background: none;
    border: none;
    cursor: pointer;
    color: #A5A09A;
    display: flex;
    align-items: center;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s;
}

.pw-toggle:hover { color: #1863DC; }

/* Error message */
.error-msg {
    display: none;
    align-items: center;
    gap: 7px;
    background: rgba(217,79,79,0.08);
    border: 1px solid rgba(217,79,79,0.25);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 12.5px;
    font-family: 'Poppins', sans-serif;
    color: #C0392B;
    font-weight: 500;
    margin-bottom: 18px;
}

.error-msg.visible { display: flex; }

.error-msg svg { flex-shrink: 0; }

/* Submit button */
.btn-login {
    width: 100%;
    padding: 14px;
    background: #1863DC;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
    box-shadow: 0 4px 14px rgba(24,99,220,0.30);
    margin-top: 4px;
}

.btn-login:hover {
    background: #1250B0;
    box-shadow: 0 6px 20px rgba(24,99,220,0.40);
}

.btn-login:active { transform: scale(0.988); }

.btn-login:disabled {
    background: #aab;
    cursor: default;
    box-shadow: none;
}

/* Footer */
.card-footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    font-family: 'Poppins', sans-serif;
    color: #A5A09A;
}

/* Spinner */
.spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
        <img src="Banque d'images/DOL-COG-IV-020-A -Logo final Groupe Dolfines FR transp.png" class="logo-img" alt="Dolfines">
    </div>

    <div class="card-title">Portail Investissement</div>
    <div class="card-sub">Connectez-vous pour accéder à votre espace</div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errorText">Identifiant ou mot de passe incorrect.</span>
    </div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

        <div class="field">
            <label for="inputEmail">Adresse e-mail</label>
            <div class="input-wrap">
                <input
                    type="email"
                    id="inputEmail"
                    name="email"
                    placeholder="exemple@domaine.com"
                    autocomplete="username"
                    required
                >
            </div>
        </div>

        <div class="field">
            <label for="inputPassword">Mot de passe</label>
            <div class="input-wrap">
                <input
                    type="password"
                    id="inputPassword"
                    name="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                >
                <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePw()" title="Afficher / masquer le mot de passe" aria-label="Afficher le mot de passe">
                    <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">Se connecter</button>

    </form>

    <div class="card-footer">Portail réservé aux utilisateurs autorisés · Dolfines © 2026</div>
</div>

<script>
// ── Si déjà connecté, rediriger directement ──────────────
(function () {
    const s = Auth.getSession();
    if (s && s.email) window.location.replace('portefeuille_projets.html');
})();

// ── Validation regex mot de passe ────────────────────────
// Lettres min/maj, chiffres, et : ./@:!*+#&
const PW_REGEX = /^[a-zA-Z0-9./@:!*+#&]+$/;

// ── Afficher/masquer mot de passe ────────────────────────
let pwVisible = false;
function togglePw() {
    pwVisible = !pwVisible;
    const inp = document.getElementById('inputPassword');
    inp.type = pwVisible ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = pwVisible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

// ── Effacer l'erreur quand l'utilisateur tape ─────────────
document.getElementById('inputEmail').addEventListener('input', clearError);
document.getElementById('inputPassword').addEventListener('input', clearError);

function clearError() {
    document.getElementById('errorMsg').classList.remove('visible');
    document.getElementById('inputEmail').classList.remove('error');
    document.getElementById('inputPassword').classList.remove('error');
}

function showError(msg) {
    document.getElementById('errorText').textContent = msg || 'Identifiant ou mot de passe incorrect.';
    document.getElementById('errorMsg').classList.add('visible');
}

// ── Soumission ───────────────────────────────────────────
function handleLogin(e) {
    e.preventDefault();
    clearError();

    const email = document.getElementById('inputEmail').value.trim();
    const pw    = document.getElementById('inputPassword').value;

    // Validation email
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        document.getElementById('inputEmail').classList.add('error');
        showError('Veuillez saisir une adresse e-mail valide.');
        return;
    }

    // Validation password charset
    if (!PW_REGEX.test(pw)) {
        document.getElementById('inputPassword').classList.add('error');
        showError('Le mot de passe contient des caractères non autorisés.');
        return;
    }

    // Tentative connexion
    const btn = document.getElementById('btnLogin');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Connexion…';

    setTimeout(() => {
        const ok = Auth.login(email, pw);
        if (ok) {
            window.location.href = 'portefeuille_projets.html';
        } else {
            btn.disabled = false;
            btn.textContent = 'Se connecter';
            document.getElementById('inputEmail').classList.add('error');
            document.getElementById('inputPassword').classList.add('error');
            showError('Identifiant ou mot de passe incorrect.');
        }
    }, 300); // petit délai UX
}
</script>
</body>
</html>
